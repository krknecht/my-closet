<style>
:root{--ink:#1c1917;--ink-2:#57534e;--ink-3:#a8a29e;--paper:#faf9f7;--paper-2:#f2f0ec;--paper-3:#e8e5df;--rule:#ddd9d2;--accent:#2d4a2d;--accent-light:#e8f0e8;--accent-mid:#4a7c4a;--gold:#8b6914;--gold-light:#f5edd6;--radius:4px;--radius-lg:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--paper);color:var(--ink);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent-mid) 50%,transparent 100%);z-index:100;pointer-events:none}
header{border-bottom:1px solid var(--rule);padding:1.125rem 2rem;display:flex;align-items:center;gap:1.5rem;background:var(--paper);position:sticky;top:0;z-index:50}
.header-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:.04em}
.header-sub{font-size:9px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase}
.header-count{font-size:10px;color:var(--ink-3);margin-left:auto}
.search-bar{padding:.75rem 2rem;border-bottom:1px solid var(--rule);background:var(--paper-2)}
.search-bar input{width:100%;max-width:400px;font-family:'DM Mono',monospace;font-size:12px;padding:7px 11px;border:1px solid var(--rule);border-radius:var(--radius);background:var(--paper);color:var(--ink);outline:none}
.search-bar input:focus{border-color:var(--ink-3)}
.filter-bar{padding:.5rem 2rem;border-bottom:1px solid var(--rule);display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--paper)}
.filter-chip{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--rule);border-radius:20px;background:var(--paper);color:var(--ink-3);cursor:pointer;transition:all .15s}
.filter-chip:hover,.filter-chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--rule);padding:0}
.card{background:var(--paper);cursor:pointer;transition:background .1s;overflow:hidden}
.card:hover{background:var(--paper-2)}
.card-img{aspect-ratio:3/4;overflow:hidden;background:var(--paper-3);display:flex;align-items:center;justify-content:center;font-size:2rem}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .card-img img{transform:scale(1.03)}
.card-info{padding:.625rem .75rem}
.card-brand{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:2px}
.card-name{font-size:11px;color:var(--ink-2);line-height:1.4;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-cat{font-size:9px;color:var(--ink-3)}
.card-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:20px}
.badge-vintage{background:var(--gold-light);color:var(--gold)}
.badge-cat{background:var(--paper-3);color:var(--ink-3)}
.empty{padding:3rem 2rem;text-align:center;font-size:12px;color:var(--ink-3);font-style:italic;font-family:'Cormorant Garamond',serif;grid-column:1/-1}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,23,.4);z-index:200}
.drawer-overlay.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:min(480px,100vw);background:var(--paper);border-left:1px solid var(--rule);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease}
.drawer.open{transform:none}
.drawer-header{padding:1.125rem 1.375rem .875rem;border-bottom:1px solid var(--rule);display:flex;align-items:flex-start;gap:12px;position:sticky;top:0;background:var(--paper);z-index:10}
.drawer-img{width:70px;height:90px;border-radius:var(--radius);overflow:hidden;flex-shrink:0;background:var(--paper-3);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.drawer-img img{width:100%;height:100%;object-fit:cover}
.drawer-titles{flex:1;min-width:0}
.drawer-brand{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.drawer-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;line-height:1.2;margin-bottom:4px}
.drawer-cat{font-size:10px;color:var(--ink-3)}
.drawer-close{background:none;border:none;font-size:22px;color:var(--ink-3);cursor:pointer;padding:2px 4px;flex-shrink:0}
.drawer-close:hover{color:var(--ink)}
.drawer-body{padding:1rem 1.375rem}
.dsec{margin-bottom:1.25rem}
.dsh{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:.5rem;padding-bottom:.25rem;border-bottom:1px solid var(--rule)}
.drow{display:flex;gap:.5rem;margin-bottom:.25rem;font-size:11px}
.dlbl{color:var(--ink-3);min-width:110px;flex-shrink:0}
.dval{color:var(--ink-2);line-height:1.5}
.dpill-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.dpill{font-size:9px;padding:2px 8px;border:1px solid var(--rule);border-radius:20px;color:var(--ink-3)}
.edit-link{display:inline-flex;align-items:center;gap:5px;margin-top:1rem;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border:1px solid var(--rule);border-radius:var(--radius);color:var(--ink-3);text-decoration:none;transition:all .15s}
.edit-link:hover{background:var(--paper-3);color:var(--ink);border-color:var(--ink-3)}
</style>
</head>

const EMOJI={'Clothing':'рџ§є','Shoes':'рџ‘џ','Bags':'рџ‘њ','Accessories':'рџ’Ќ','Jewelry':'рџ’Ћ','Activewear':'рџЏѓ','Swimwear':'рџЊЉ','Lingerie & Loungewear':'рџЊ™'};
const FL={1:'Loungewear',2:'Casual',3:'Weekend casual',4:'Smart casual',5:'Smart casual (elevated)',6:'Business casual',7:'Business formal',8:'Cocktail / Evening',9:'Formal / Gala',10:'Black tie'};
let activeFilter='All',searchQ='';
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initChips(){
  const depts=['All',...new Set(allItems.map(i=>i.category.department).filter(Boolean))];
  const bar=document.getElementById('dept-chips');bar.innerHTML='';
  depts.forEach(d=>{const b=document.createElement('button');b.className='filter-chip'+(d==='All'?' active':'');b.textContent=d;b.onclick=()=>{activeFilter=d;bar.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.textContent===d));filterGallery();};bar.appendChild(b);});
}
function filterGallery(){
  const q=document.getElementById('gal-search').value.toLowerCase().trim();searchQ=q;
  const filtered=allItems.filter(i=>{
    if(activeFilter!=='All'&&i.category.department!==activeFilter)return false;
    if(!q)return true;
    return[i.identity.name,i.identity.brand,i.category.category,i.category.subcategory,...(i.meta.tags||[])].join(' ').toLowerCase().includes(q);
  });
  const gal=document.getElementById('gallery');gal.innerHTML='';
  document.getElementById('gal-count').textContent=filtered.length+' items';
  if(!filtered.length){gal.innerHTML='<div class="empty">No items match your search.</div>';return;}
  filtered.forEach(item=>{
    const el=document.createElement('div');el.className='card';el.setAttribute('data-id',item.id);el.onclick=()=>openDrawer(item.id);
    const dept=item.category.department||'';
    el.innerHTML='<div class="card-img">'+(item.image&&item.image.filename?'<img src="'+esc(item.image.filename)+'" alt="'+esc(item.identity.name)+'" loading="lazy" onerror="this.parentNode.innerHTML=\''+esc(EMOJI[dept]||'рџ§є')+'\'"/>':'<span>'+esc(EMOJI[dept]||'рџ§є')+'</span>')+'</div><div class="card-info"><div class="card-brand">'+esc(item.identity.brand||'')+'</div><div class="card-name">'+esc(item.identity.name)+'</div><div class="card-cat">'+esc([item.category.category,item.category.subcategory].filter(Boolean).join(' вЂє '))+'</div><div class="card-badges">'+(item.identity.vintage&&item.identity.vintage.is_vintage?'<span class="badge badge-vintage">Vintage</span>':'')+'</div></div>';
    gal.appendChild(el);
  });
}
function openDrawer(id){
  const item=itemsMap[id];if(!item)return;
  const dept=item.category.department||'';
  const imgEl=document.getElementById('d-img');
  imgEl.innerHTML=item.image&&item.image.filename?'<img src="'+esc(item.image.filename)+'" alt="'+esc(item.identity.name)+'" onerror="this.parentNode.innerHTML=\''+esc(EMOJI[dept]||'рџ§є')+'\'"/>':'<span>'+esc(EMOJI[dept]||'рџ§є')+'</span>';
  document.getElementById('d-brand').textContent=item.identity.brand||'';
  document.getElementById('d-name').textContent=item.identity.name;
  document.getElementById('d-cat').textContent=[item.category.department,item.category.category,item.category.subcategory].filter(Boolean).join(' вЂє ');
  const body=document.getElementById('d-body');let h='';
  function row(l,v){return v?'<div class="drow"><span class="dlbl">'+l+'</span><span class="dval">'+esc(String(v))+'</span></div>':'';}
  h+='<div class="dsec"><div class="dsh">Identity</div>';
  if(item.identity.vintage&&item.identity.vintage.is_vintage)h+='<div class="drow"><span class="dlbl">Vintage</span><span class="dval">Yes'+(item.identity.vintage.era?' вЂ” '+esc(item.identity.vintage.era):'')+'</span></div>';
  h+=row('Colorway',item.identity.colorway_name)+row('SKU',item.identity.sku)+row('Collection',item.identity.collection_season)+row('Year acquired',item.identity.year_acquired)+'</div>';
  h+='<div class="dsec"><div class="dsh">Visual</div>'+row('Colors',[item.visual.colors&&item.visual.colors.primary,item.visual.colors&&item.visual.colors.secondary,item.visual.colors&&item.visual.colors.tertiary].filter(Boolean).join(', '))+row('Pattern',item.visual.pattern)+row('Print',item.visual.print_description)+row('Silhouette',item.visual.silhouette)+row('Length',item.visual.length)+row('Sleeve',item.visual.sleeve_length)+'</div>';
  if(item.construction.fabric&&item.construction.fabric.length){h+='<div class="dsec"><div class="dsh">Construction</div>';h+=row('Fabric',item.construction.fabric.map(f=>f.material+(f.percentage?' '+f.percentage+'%':'')).join(', '));h+=row('Weight',item.construction.weight)+row('Structure',item.construction.structure)+row('Seasons',(item.construction.seasons||[]).join(', '))+row('Care',item.construction.care)+row('Origin',item.construction.country_of_origin)+'</div>';}
  if(item.wearing_profile){const fp=item.wearing_profile.formality;h+='<div class="dsec"><div class="dsh">Wearing profile</div>';if(fp)h+=row('Formality',FL[fp.min]+' в†’ '+FL[fp.max]);h+=row('Style notes',item.wearing_profile.style_notes);if((item.wearing_profile.occasions||[]).length)h+='<div class="drow"><span class="dlbl">Occasions</span><div class="dpill-wrap">'+item.wearing_profile.occasions.map(o=>'<span class="dpill">'+esc(o)+'</span>').join('')+'</div></div>';if((item.wearing_profile.feels||[]).length)h+='<div class="drow"><span class="dlbl">Feels</span><div class="dpill-wrap">'+item.wearing_profile.feels.map(f=>'<span class="dpill">'+esc(f)+'</span>').join('')+'</div></div>';h+='</div>';}
  if(item.provenance){h+='<div class="dsec"><div class="dsh">Provenance</div>'+row('Retailer',item.provenance.retailer)+row('Acquired',item.provenance.acquisition_type)+(item.provenance.purchase_price&&item.provenance.purchase_price.amount?row('Price','$'+item.provenance.purchase_price.amount):'')+row('Condition',item.provenance.current_condition)+row('Storage',item.provenance.storage_location)+'</div>';}
  if(item.meta&&item.meta.claude_context)h+='<div class="dsec"><div class="dsh">Notes for Claude</div><div style="font-size:11px;color:var(--ink-2);line-height:1.6;padding:6px 9px;background:var(--paper-2);border-radius:var(--radius);border-left:2px solid var(--ink-3)">'+esc(item.meta.claude_context)+'</div></div>';
  h+='<a class="edit-link" href="closet-manager.html">Edit in Manager в†—</a>';
  body.innerHTML=h;
  document.getElementById('drawer-overlay').classList.add('open');document.getElementById('drawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDrawer(){document.getElementById('drawer-overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
initChips();filterGallery();
</script>
