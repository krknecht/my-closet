<style>
@font-face {
  font-family: 'Vend Sans';
  src: url('/VendSans-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
@font-face {

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Vend Sans',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
header{border-bottom:1px solid rgba(255,255,255,0.1);background:#000;position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px}
.wordmark{font-family:'Vend Sans',sans-serif;font-size:22px;font-weight:300;letter-spacing:.06em;color:#fff}
.header-right{display:flex;align-items:center;gap:1.75rem}
.gal-count-lbl{font-size:11px;color:rgba(255,255,255,0.5)}
.add-item-link{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#fff;border-bottom:1px solid rgba(255,255,255,0.5);padding-bottom:1px;transition:opacity .15s}
.add-item-link:hover{opacity:.5}
.nav-tabs{display:flex;gap:0;border:1px solid rgba(255,255,255,0.2);border-radius:4px;overflow:hidden}
.nav-tab{padding:6px 14px;font-size:10px;font-family:'Vend Sans',sans-serif;letter-spacing:.1em;text-transform:uppercase;border:none;background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center}
.nav-tab:not(:last-child){border-right:1px solid rgba(255,255,255,0.2)}
.nav-tab.active{background:#fff;color:#000}
.nav-tab:not(.active):hover{background:rgba(255,255,255,0.1);color:#fff}
.page-body{display:flex;align-items:flex-start}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid #e5e5e5;min-height:calc(100vh - 53px);position:sticky;top:53px;overflow-y:auto;max-height:calc(100vh - 53px)}
.search-wrap{padding:1rem 1.25rem;border-bottom:1px solid #e5e5e5}
.search-wrap input{width:100%;font-family:inherit;font-size:12px;border:none;border-bottom:1px solid #e5e5e5;padding:4px 0;outline:none;color:#1a1a1a;background:transparent}
.search-wrap input::placeholder{color:#767676}
.search-wrap input:focus{border-color:#000}
.sidebar-clear{padding:.5rem 1.25rem;border-bottom:1px solid #e5e5e5}
.sidebar-clear button{font-family:inherit;font-size:11px;color:#767676;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px}
.sidebar-clear button:hover{color:#1a1a1a}
.filter-group{border-bottom:1px solid #e5e5e5}
.fg-head{display:flex;justify-content:space-between;align-items:center;padding:.625rem 1.25rem;cursor:pointer;user-select:none}
.fg-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#1a1a1a;font-weight:500}
.fg-toggle{font-size:15px;color:#767676;font-weight:300;line-height:1}
.fg-body{padding:0 1.25rem .625rem;display:none}
.fg-body.open{display:block}
.fg-sort-sel{width:100%;font-family:inherit;font-size:12px;color:#1a1a1a;border:none;border-bottom:1px solid #e5e5e5;padding:4px 0;outline:none;background:transparent;cursor:pointer;-webkit-appearance:none;appearance:none}
.fo-btn{display:block;width:100%;text-align:left;font-family:inherit;font-size:12px;color:#767676;background:none;border:none;padding:3px 0;cursor:pointer;line-height:1.7}
.fo-btn:hover{color:#1a1a1a}
.fo-btn.active{color:#000;font-weight:500}
.formality-wrap{padding:2px 0 4px}
.formality-range-labels{display:flex;justify-content:space-between;font-size:11px;color:#767676;margin-bottom:6px}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:1px;background:#e5e5e5;border-radius:0;outline:none;cursor:pointer;display:block;margin:7px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#000;cursor:pointer;border:none}
input[type=range]::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:#000;cursor:pointer;border:none}
.main-content{flex:1;min-width:0;padding:2rem}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:2rem 1.5rem}
.card{cursor:pointer}
.card-img{aspect-ratio:3/4;overflow:hidden;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:.75rem}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.card:hover .card-img img{transform:scale(1.04)}
.card-info{padding:0}
.card-brand{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#1a1a1a;margin-bottom:3px;font-weight:500}
.card-name{font-size:13px;color:#1a1a1a;line-height:1.4;margin-bottom:2px}
.card-cat{font-size:11px;color:#767676}
.card-badges{margin-top:4px}
.badge{font-size:11px;color:#767676}
.badge-vintage{color:#1a1a1a;font-style:italic}
.empty{padding:4rem;text-align:center;font-size:13px;color:#767676;grid-column:1/-1}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200}
.drawer-overlay.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:min(500px,100vw);background:#fff;border-left:1px solid #e5e5e5;z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease}
.drawer.open{transform:none}
.drawer-header{padding:1.5rem;border-bottom:1px solid #e5e5e5;display:flex;align-items:flex-start;gap:1rem;position:sticky;top:0;background:#fff;z-index:10}
.drawer-img{width:80px;height:104px;overflow:hidden;flex-shrink:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.drawer-img img{width:100%;height:100%;object-fit:cover;display:block}
.drawer-titles{flex:1;min-width:0;padding-top:2px}
.drawer-brand{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#767676;margin-bottom:5px;font-weight:500}
.drawer-name{font-family:'Vend Sans',sans-serif;font-size:24px;font-weight:300;line-height:1.2;margin-bottom:4px;color:#000}
.drawer-cat{font-size:12px;color:#767676}
.drawer-close{background:none;border:none;font-size:22px;color:#767676;cursor:pointer;padding:0;flex-shrink:0;line-height:1;transition:color .12s}
.drawer-close:hover{color:#000}
.drawer-body{padding:1.5rem}
.dsec{margin-bottom:1.5rem}
.dsh{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#767676;margin-bottom:.625rem;padding-bottom:.5rem;border-bottom:1px solid #e5e5e5;font-weight:500}
.drow{display:flex;gap:1rem;margin-bottom:.375rem;font-size:12px}
.dlbl{color:#767676;min-width:120px;flex-shrink:0}
.dval{color:#1a1a1a;line-height:1.5}
.dpill-wrap{display:flex;flex-wrap:wrap;gap:0;margin-top:4px}
.dpill{font-size:11px;color:#767676}
.dpill:not(:last-child)::after{content:',В '}
.edit-link{display:inline-block;margin-top:1.25rem;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#000;border-bottom:1px solid #000;padding-bottom:1px;transition:opacity .15s}
.edit-link:hover{opacity:.5}
</style>
</head>

<div class="page-body">

          <option value="form-desc">Formality вЂ” high в†’ low</option>
        </select>
      </div>
    </div>
    <div class="filter-group">

    </div>
    <div class="filter-group" id="fp-row-subcat" style="display:none">

      <div class="fg-body open" id="fp-subcat"></div>
    </div>
    <div class="filter-group">
      <div class="fg-head" onclick="toggleFG(this)"><span class="fg-label">Season</span><span class="fg-toggle">в€’</span></div>
      <div class="fg-body open" id="fp-season"></div>
    </div>
    <div class="filter-group">
      <div class="fg-head" onclick="toggleFG(this)"><span class="fg-label">Brand</span><span class="fg-toggle">в€’</span></div>
      <div class="fg-body open" id="fp-brand"></div>
    </div>
    <div class="filter-group">
      <div class="fg-head" onclick="toggleFG(this)"><span class="fg-label">Weight</span><span class="fg-toggle">в€’</span></div>
      <div class="fg-body open" id="fp-weight"></div>
    </div>
    <div class="filter-group">
      <div class="fg-head" onclick="toggleFG(this)"><span class="fg-label">Formality</span><span class="fg-toggle">в€’</span></div>

      </div>
    </div>
    <div class="filter-group" id="fp-row-occ" style="display:none">
      <div class="fg-head" onclick="toggleFG(this)"><span class="fg-label">Occasion</span><span class="fg-toggle">в€’</span></div>
      <div class="fg-body open" id="fp-occ"></div>
    </div>
  </aside>
  <main class="main-content">
    <div class="gallery" id="gallery"></div>
  </main>
</div>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">

    <div class="drawer-img" id="d-img"></div>

    </div>
    <button class="drawer-close" onclick="closeDrawer()">&times;</button>
  </div>
  <div class="drawer-body" id="d-body"></div>
</div>

function sortItems(arr){
  const s=document.getElementById('gal-sort').value;
  return[...arr].sort((a,b)=>{
    if(s==='date-asc')return new Date(a.created_at)-new Date(b.created_at);
    if(s==='date-desc')return new Date(b.created_at)-new Date(a.created_at);
    if(s==='brand-asc')return(a.identity.brand||'').localeCompare(b.identity.brand||'');
    if(s==='brand-desc')return(b.identity.brand||'').localeCompare(a.identity.brand||'');
    if(s==='form-asc')return(a.wearing_profile?.formality?.min||0)-(b.wearing_profile?.formality?.min||0);
    if(s==='form-desc')return(b.wearing_profile?.formality?.max||0)-(a.wearing_profile?.formality?.max||0);
    return 0;
  });
}
function filterGallery(){
  const q=document.getElementById('gal-search').value.toLowerCase().trim();
  let filtered=allItems.filter(i=>{
    if(filters.dept!=='All'&&i.category.department!==filters.dept)return false;

    if(filters.seasons.length&&!filters.seasons.some(s=>(i.construction.seasons||[]).includes(s)))return false;
    if(filters.brands.length&&!filters.brands.includes(i.identity.brand))return false;
    if(filters.weights.length&&!filters.weights.includes(i.construction.weight))return false;
    if(filters.occasions.length&&!filters.occasions.some(o=>(i.wearing_profile.occasions||[]).includes(o)))return false;
    const fp=i.wearing_profile?.formality;
    if(fp&&(filters.formalityMin>1||filters.formalityMax<10)){if(fp.max<filters.formalityMin||fp.min>filters.formalityMax)return false;}

    return true;

  h+='<div class="dsec"><div class="dsh">Visual</div>'+row('Colors',[item.visual.colors&&item.visual.colors.primary,item.visual.colors&&item.visual.colors.secondary,item.visual.colors&&item.visual.colors.tertiary].filter(Boolean).join(', '))+row('Pattern',item.visual.pattern)+row('Print',item.visual.print_description)+row('Silhouette',item.visual.silhouette)+row('Length',item.visual.length)+row('Sleeve',item.visual.sleeve_length)+'</div>';
  if(item.construction.fabric&&item.construction.fabric.length){h+='<div class="dsec"><div class="dsh">Construction</div>';h+=row('Fabric',item.construction.fabric.map(f=>f.material+(f.percentage?' '+f.percentage+'%':'')).join(', '));h+=row('Weight',item.construction.weight)+row('Structure',item.construction.structure)+row('Seasons',(item.construction.seasons||[]).join(', '))+row('Care',item.construction.care)+row('Origin',item.construction.country_of_origin)+'</div>';}
  if(item.wearing_profile){const fp=item.wearing_profile.formality;h+='<div class="dsec"><div class="dsh">Wearing profile</div>';if(fp)h+=row('Formality',FL[fp.min]+' в†’ '+FL[fp.max]);h+=row('Style notes',item.wearing_profile.style_notes);if((item.wearing_profile.occasions||[]).length)h+='<div class="drow"><span class="dlbl">Occasions</span><div class="dpill-wrap">'+item.wearing_profile.occasions.map(o=>'<span class="dpill">'+esc(o)+'</span>').join('')+'</div></div>';if((item.wearing_profile.feels||[]).length)h+='<div class="drow"><span class="dlbl">Feels</span><div class="dpill-wrap">'+item.wearing_profile.feels.map(f=>'<span class="dpill">'+esc(f)+'</span>').join('')+'</div></div>';h+='</div>';}
  if(item.provenance){h+='<div class="dsec"><div class="dsh">Provenance</div>'+row('Retailer',item.provenance.retailer)+row('Acquired',item.provenance.acquisition_type)+(item.provenance.purchase_price&&item.provenance.purchase_price.amount?row('Price','$'+item.provenance.purchase_price.amount):'')+row('Condition',item.provenance.current_condition)+row('Storage',item.provenance.storage_location)+'</div>';}
  if(item.meta&&item.meta.claude_context)h+='<div class="dsec"><div class="dsh">Notes for Claude</div><div style="font-size:11px;color:var(--ink-2);line-height:1.6;padding:6px 9px;background:var(--paper-2);border-radius:var(--radius);border-left:2px solid var(--ink-3)">'+esc(item.meta.claude_context)+'</div></div>';
  h+='<a class="edit-link" href="closet-manager.html">Edit in Manager в†—</a>';
  body.innerHTML=h;
  document.getElementById('drawer-overlay').classList.add('open');document.getElementById('drawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDrawer(){document.getElementById('drawer-overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
initFilters();filterGallery();
</script>
</body>
